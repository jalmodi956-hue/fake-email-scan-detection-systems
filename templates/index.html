<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Email Detector</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">📧 Fake Email Detector</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/dashboard">Dashboard</a>
            <a class="nav-link" href="/export">Export CSV</a>
        </div>
    </div>
</nav>
    <div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center text-primary">
            📧 Fake Email Detector
        </h1>

        <hr>

    <form method="POST">

        <div class="mb-3">
    <label for="email" class="form-label">
        <b>📧 Email Address</b>
    </label>

    <input
        type="text"
        class="form-control"
        id="email"
        name="email"
        placeholder="Enter Email Address"
        value="{{ email or '' }}"
        required>
</div>

    <div class="mb-3">
    <label for="content" class="form-label">
        <b>📝 Email Content</b>
    </label>

    <textarea
        class="form-control"
        id="content"
        name="content"
        rows="8"
        placeholder="Paste Email Content Here"
        required>{{ content or '' }}</textarea>
</div>

        <br><br>
    <button type="submit" class="btn btn-primary btn-lg">
    🔍 Scan Email
</button>

    </form>
    <br>

    <a href="/dashboard" class="btn btn-dark">
    Dashboard
    </a>

    <a href="/export" class="btn btn-success">
        Export CSV
    </a>
    <a href="/pdf" class="btn btn-danger">
    📄 Download PDF Report
    </a>
    <button onclick="window.print()" class="btn btn-secondary">
    🖨️ Print Report
    </button>
    
    <hr>
    {% if result %}

    {% if verdict == "safe" %}
    <div class="alert alert-success mt-4">

   {% elif verdict == "suspicious" %}
    <div class="alert alert-warning mt-4">

    {% else %}
    <div class="alert alert-danger mt-4">
    {% endif %}
    <h3>📋 Scan Result</h3>
    <hr>

    {{ result | safe }}
    <hr>

<h5>📊 Risk Score</h5>

<div class="progress" style="height:30px;">
    <div class="progress-bar {% if verdict == 'safe' %}bg-success{% elif verdict == 'suspicious' %}bg-warning{% else %}bg-danger{% endif %}"
        role="progressbar"
        style="width:0%;"
        data-risk-score="{{ risk_score }}"
        aria-valuenow="{{ risk_score }}"
        aria-valuemin="0"
        aria-valuemax="100">
        {{ risk_score }}%
    </div>
</div>

</div>
{% endif %}
</div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var bar = document.querySelector('.progress-bar[data-risk-score]');
        if (bar) {
            var score = bar.getAttribute('data-risk-score');
            if (score !== null) {
                bar.style.width = score + '%';
            }
        }
    });
</script>
</body>
</html>
